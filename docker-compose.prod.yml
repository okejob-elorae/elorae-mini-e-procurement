# Production deploy on Hostinger VPS (or any single-host Docker setup).
# Brings up: MariaDB + Redis (BullMQ backend) + apps/api (NestJS) + apps/web (Next.js) + Caddy (auto-SSL reverse proxy).
#
# First-time:
#   cp .env.production.example .env.production
#   cp .env.production.web.example .env.production.web
#   <fill in secrets — see DB_ROOT_PASSWORD + DB_PASSWORD>
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Subsequent deploys:
#   git pull
#   docker compose -f docker-compose.prod.yml up -d --build api
#
# Local dev access to this DB: SSH tunnel from laptop —
#   ssh -fNL 3306:127.0.0.1:3306 elorae@api.elorae.cloud
#   Then point apps/web/.env DATABASE_URL at mysql://elorae:<pw>@127.0.0.1:3306/elorae
#
# Logs:
#   docker compose -f docker-compose.prod.yml logs -f api
#   docker compose -f docker-compose.prod.yml logs -f caddy
#   docker compose -f docker-compose.prod.yml logs -f db

services:
  db:
    image: mariadb:11.4
    container_name: elorae-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: elorae
      MARIADB_USER: elorae
      MARIADB_PASSWORD: ${DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=1G
      # Disable TLS — the db port is bound to 127.0.0.1 on the VPS, traffic
      # to api/web travels only over the docker internal network, and the
      # SSH tunnel for local dev encrypts at the SSH layer. MariaDB ships
      # with a self-signed cert by default and Prisma's connector fails
      # verification on it; disabling here is simpler than trusting it
      # everywhere.
      - --skip-ssl
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uelorae -p$$MARIADB_PASSWORD --skip-ssl --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: elorae-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/okejob-elorae/elorae-api:${IMAGE_TAG:-master}
    container_name: elorae-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      # node:22-slim ships without wget/curl. Use node's native fetch instead —
      # guaranteed present since it's the runtime.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/okejob-elorae/elorae-web:${IMAGE_TAG:-master}
    container_name: elorae-web
    restart: unless-stopped
    env_file:
      - .env.production.web
    environment:
      # Next.js standalone server: bind to all interfaces so the in-container
      # healthcheck (localhost:3000) works alongside external docker-network access.
      HOSTNAME: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    container_name: elorae-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web
    networks:
      - internal

volumes:
  db-data:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
