name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to deploy"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - web
          - api
      image_tag:
        description: "Image tag to deploy (SHA or 'master'). Blank = this run's commit SHA."
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/db/**'
              - 'pnpm-lock.yaml'
              - 'docker-compose.prod.yml'
              - 'Caddyfile'
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'pnpm-lock.yaml'
              - 'docker-compose.prod.yml'
              - 'Caddyfile'

  build-push-web:
    name: Build + push web image
    needs: changes
    if: |
      (github.event_name == 'push' && needs.changes.outputs.web == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'both' || inputs.service == 'web'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/okejob-elorae/elorae-web:${{ github.sha }}
            ghcr.io/okejob-elorae/elorae-web:master
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}

  build-push-api:
    name: Build + push api image
    needs: changes
    if: |
      (github.event_name == 'push' && needs.changes.outputs.api == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'both' || inputs.service == 'api'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/okejob-elorae/elorae-api:${{ github.sha }}
            ghcr.io/okejob-elorae/elorae-api:master
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  pull:
    name: Pull latest master on VPS
    needs: changes
    if: |
      (github.event_name == 'push' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.api == 'true')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: SSH and pull
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 2m
          command_timeout: 2m
          script: |
            set -euo pipefail
            cd /srv/elorae
            git fetch origin master
            git reset --hard origin/master

  migrate:
    name: Migrate database
    needs: pull
    runs-on: ubuntu-latest
    steps:
      - name: SSH and apply migrations
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 2m
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /srv/elorae

            # Apply pending Prisma migrations via mariadb client (skip prisma migrate engine —
            # it refuses to connect to the --skip-ssl MariaDB regardless of URL params).
            # Idempotent: reads applied names from _prisma_migrations, applies + records the diff.
            DB_ROOT_PASSWORD=$(grep ^DB_ROOT_PASSWORD= .env | cut -d= -f2)
            docker exec -i elorae-db mariadb -uroot -p"${DB_ROOT_PASSWORD}" --skip-ssl elorae <<'SQL'
            CREATE TABLE IF NOT EXISTS _prisma_migrations (
              id varchar(36) NOT NULL PRIMARY KEY,
              checksum varchar(64) NOT NULL,
              finished_at datetime(3) DEFAULT NULL,
              migration_name varchar(255) NOT NULL,
              logs text,
              rolled_back_at datetime(3) DEFAULT NULL,
              started_at datetime(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3),
              applied_steps_count int UNSIGNED NOT NULL DEFAULT 0
            );
            SQL
            APPLIED=$(docker exec elorae-db mariadb -uroot -p"${DB_ROOT_PASSWORD}" --skip-ssl -N -B -e "SELECT migration_name FROM elorae._prisma_migrations")
            cd packages/db/prisma/migrations
            for m in $(ls -d */ | sort); do
              NAME=$(basename "$m")
              if ! grep -qx "$NAME" <<< "$APPLIED"; then
                echo ">>> Applying $NAME"
                docker exec -i elorae-db mariadb -uroot -p"${DB_ROOT_PASSWORD}" --skip-ssl elorae < "${m}migration.sql"
                CHECKSUM=$(sha256sum "${m}migration.sql" | cut -d' ' -f1)
                UUID=$(cat /proc/sys/kernel/random/uuid)
                docker exec -i elorae-db mariadb -uroot -p"${DB_ROOT_PASSWORD}" --skip-ssl elorae -e "INSERT INTO _prisma_migrations (id, checksum, finished_at, migration_name, started_at, applied_steps_count) VALUES ('$UUID', '$CHECKSUM', NOW(3), '$NAME', NOW(3), 1);"
              fi
            done

  deploy-api:
    name: Deploy api
    needs: [changes, build-push-api, migrate]
    # No always() here on purpose: this if implicitly ANDs with "all needs succeeded",
    # so a failed/skipped build-push-api or migrate correctly blocks the deploy. Do NOT
    # add always() without also adding explicit needs.*.result checks (see deploy-web).
    if: |
      (github.event_name == 'push' && needs.changes.outputs.api == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'both' || inputs.service == 'api'))
    runs-on: ubuntu-latest
    steps:
      - name: SSH pull + restart api
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE_TAG
          timeout: 2m
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /srv/elorae
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d --no-build api
            docker image prune -f

  deploy-web:
    name: Deploy web
    needs: [changes, build-push-web, migrate, deploy-api]
    # Sequential after api. always() lets it evaluate when deploy-api is skipped
    # (api unchanged); still requires migrate + build-push-web success and web changed.
    if: |
      always() &&
      needs.migrate.result == 'success' &&
      needs.build-push-web.result == 'success' &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped') &&
      (
        (github.event_name == 'push' && needs.changes.outputs.web == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.service == 'both' || inputs.service == 'web'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: SSH pull + restart web
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE_TAG
          timeout: 2m
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /srv/elorae
            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d --no-build web
            docker image prune -f
