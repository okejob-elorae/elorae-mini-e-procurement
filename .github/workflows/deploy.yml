name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to deploy"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - web
          - api

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/db/**'
              - 'pnpm-lock.yaml'
              - 'docker-compose.prod.yml'
              - 'Caddyfile'
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'pnpm-lock.yaml'
              - 'docker-compose.prod.yml'
              - 'Caddyfile'

  deploy-web:
    name: Deploy web
    needs: changes
    if: |
      (github.event_name == 'push' && needs.changes.outputs.web == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'both' || inputs.service == 'web'))
    runs-on: ubuntu-latest
    steps:
      - name: SSH and rebuild web
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 2m
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /srv/elorae
            git pull --ff-only
            docker compose -f docker-compose.prod.yml up -d --build web
            docker image prune -f

  deploy-api:
    name: Deploy api
    needs: [changes, deploy-web]
    if: |
      always() &&
      (needs.deploy-web.result == 'success' || needs.deploy-web.result == 'skipped') &&
      (
        (github.event_name == 'push' && needs.changes.outputs.api == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.service == 'both' || inputs.service == 'api'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: SSH and rebuild api
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 2m
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /srv/elorae
            git pull --ff-only
            docker compose -f docker-compose.prod.yml up -d --build api
            docker image prune -f
